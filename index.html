<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>北京环球影城攻略</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;--border:#e5e5ea;
  --green:#34c759;--orange:#ff9500;--red:#ff3b30;
  --radius:14px;
  /* 语义色 */
  --yellow: #f1c40f;
  /* 透明度辅助 */
  --glass-bg: rgba(255,255,255,.85);
  --glass-border: rgba(0,0,0,.08);
  --divider: rgba(0,0,0,.04);
  --shadow-color: rgba(0,0,0,.06);
  --shadow: 0 1px 4px var(--shadow-color);
  /* 非实体内容：黑白灰 */
  --neutral: #3a3a3c;
  --neutral-light: rgba(0,0,0,.04);
  --neutral-border: rgba(0,0,0,.15);
  --opinion-bg: linear-gradient(135deg, #f9f9fb, #f5f5f7);
  --relations-bg: linear-gradient(135deg, #f9f9fb, #f5f5f7);
  /* 实体颜色：高区分度、统一饱和度 */
  --c-attraction: #007aff;   /* 蓝 — 项目 */
  --c-show: #af52de;         /* 紫 — 演出 */
  --c-restaurant: #ff9500;   /* 橙 — 餐厅 */
  --c-dish: #ff9500;         /* 橙 — 菜品（与餐厅同系） */
  --c-tip: #34c759;          /* 绿 — 技巧 */
  --c-warning: #ff3b30;      /* 红 — 避雷 */
  --c-shortcut: #8e8e93;     /* 灰 — 小道（中性） */
  --c-itinerary: #5856d6;    /* 靛蓝 — 行程 */
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;padding-top:56px;padding-bottom:64px}
a{color:var(--neutral);text-decoration:none}

/* 顶栏 */
#header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--glass-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid var(--glass-border);display:flex;align-items:center;padding:0 16px;z-index:100}
#header .logo{font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--text)}
#header .search-btn{flex:1;margin:0 12px;display:flex;align-items:center;justify-content:center;height:32px;border-radius:10px;background:var(--divider);border:1px solid var(--shadow-color);font-size:13px;color:var(--sub);cursor:pointer;letter-spacing:.2px}

/* 底栏 */
#nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--glass-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:0.5px solid var(--glass-border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
#nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--sub);text-decoration:none;letter-spacing:.3px;transition:color .2s;position:relative}
#nav a.active{color:var(--text);font-weight:600}
#nav a.active::after{content:'';position:absolute;bottom:4px;width:16px;height:2.5px;border-radius:2px;background:var(--text)}
#nav a .icon{font-size:22px;margin-bottom:1px}

/* 内容区 */
#app{padding:14px 12px;max-width:600px;margin:0 auto}

/* 卡片 */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card.standalone{margin-bottom:12px}
.card.hint{margin-bottom:16px}
.warn-banner{background:linear-gradient(135deg,#f9f9fb,#f5f5f7);border-left:4px solid var(--neutral);margin-bottom:12px;padding:10px 14px;font-size:13px;color:var(--neutral)}
.footer-text{margin-top:20px;text-align:center;color:var(--sub);font-size:13px}
.card h3{font-size:16px;margin-bottom:8px;font-weight:600;letter-spacing:-.2px}
.card p{margin-bottom:5px}
.card p:last-child{margin-bottom:0}

/* 标签 */
.tag{display:inline-block;background:var(--neutral-light);color:var(--neutral);padding:4px 10px;border-radius:20px;font-size:12px;margin:2px 4px 2px 0;font-weight:500}
.tag.zone{background:rgba(255,149,0,.1);color:var(--orange)}
.tag.warn{background:rgba(255,59,48,.08);color:var(--red)}
.tag.intensity{background:rgba(255,59,48,.08);color:var(--red)}
.tag.audience{background:rgba(175,82,222,.08);color:var(--c-show)}
.tag.utility{background:rgba(52,199,89,.08);color:var(--green)}
.tag.taste{background:rgba(255,149,0,.08);color:var(--orange)}
.tag.meta_tag{background:var(--neutral-light);color:var(--neutral)}
.tag.clickable{cursor:pointer;border:1px solid var(--neutral-border)}
.tag.clickable:active{background:var(--neutral-light)}

/* 评分 */
.stars{color:var(--yellow);letter-spacing:1px;font-size:14px}

/* 严重度 */
.sev-high{color:var(--red);font-weight:700}
.sev-medium{color:var(--orange);font-weight:600}
.sev-low{color:var(--green)}

/* 网格 */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.grid-item{background:var(--card);border-radius:var(--radius);padding:22px 8px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.grid-item:active{transform:scale(.96)}
.grid-item .num{font-size:32px;font-weight:800;color:var(--neutral);letter-spacing:-.8px}
.grid-item .label{font-size:11px;color:var(--sub);margin-top:4px;letter-spacing:.3px}
.grid-item .grid-hint{font-size:10px;color:var(--sub);margin-top:2px;opacity:.7}

/* 筛选栏 */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.filter-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--text);transition:all .2s}
.filter-btn.active{background:var(--text);color:var(--card);border-color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* 列表项 */
.list-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:transform .15s;border-left:3px solid transparent}
.list-item:active{transform:scale(.985)}
.list-item .info{flex:1;min-width:0}
.list-item .info h4{font-size:15px;margin-bottom:3px;font-weight:600;letter-spacing:-.1px}
.list-item .info p{font-size:13px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .arrow{color:var(--sub);font-size:18px;margin-left:8px;font-weight:300}

/* 首页Top5横向柱状图 */
.rank-chart{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.rank-chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:-.2px}
.rank-row{display:flex;align-items:center;margin-bottom:10px;cursor:pointer;transition:transform .15s}
.rank-row:last-child{margin-bottom:0}
.rank-row:active{transform:scale(.98)}
.rank-num{width:22px;font-size:13px;font-weight:800;color:var(--c-attraction);flex-shrink:0}
.rank-name{width:130px;font-size:12px;font-weight:600;color:var(--text);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.rank-bar-wrap{flex:1;height:26px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.rank-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;transition:width .6s ease}
.rank-bar span{font-size:11px;font-weight:700;color:var(--card);white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.rank-stars{margin-left:6px;font-size:11px;flex-shrink:0}

/* 首页技巧网格 */
.tip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.tip-card{background:var(--card);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;border-left:3px solid var(--c-tip)}
.tip-card:active{transform:scale(.97)}
.tip-card .tip-icon{font-size:20px;margin-bottom:6px}
.tip-card h4{font-size:13px;font-weight:600;margin-bottom:4px;letter-spacing:-.1px;line-height:1.3}
.tip-card p{font-size:11px;color:var(--sub);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* 首页菜品横向滚动 — 已改为网格，样式备用已移除 */

/* 首页轮播 */
.carousel{position:relative;margin-bottom:12px;overflow:hidden;touch-action:pan-y}
.carousel-track{display:flex;transition:transform .35s ease}
.carousel-slide{width:100%;flex-shrink:0}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .3s}
.carousel-dot.active{background:var(--neutral);width:18px;border-radius:3px}
.list-item[data-type="attraction"]{border-left-color:var(--c-attraction)}
.list-item[data-type="show"]{border-left-color:var(--c-show)}
.list-item[data-type="restaurant"]{border-left-color:var(--c-restaurant)}
.list-item[data-type="dish"]{border-left-color:var(--c-dish)}
.list-item[data-type="tip"]{border-left-color:var(--c-tip)}
.list-item[data-type="warning"]{border-left-color:var(--c-warning)}
.list-item[data-type="shortcut"]{border-left-color:var(--c-shortcut)}
.list-item[data-type="itinerary"]{border-left-color:var(--c-itinerary)}
.detail-header{border-left:4px solid var(--neutral)}
.detail-header[data-type="attraction"]{border-left-color:var(--c-attraction)}
.detail-header[data-type="show"]{border-left-color:var(--c-show)}
.detail-header[data-type="restaurant"]{border-left-color:var(--c-restaurant)}
.detail-header[data-type="dish"]{border-left-color:var(--c-dish)}
.detail-header[data-type="tip"]{border-left-color:var(--c-tip)}
.detail-header[data-type="warning"]{border-left-color:var(--c-warning)}
.detail-header[data-type="shortcut"]{border-left-color:var(--c-shortcut)}
.detail-header[data-type="itinerary"]{border-left-color:var(--c-itinerary)}

/* 详情页 */
.detail-header{background:var(--card);border-radius:var(--radius);padding:22px 18px 18px;margin-bottom:10px;box-shadow:var(--shadow)}
.detail-header h2{font-size:22px;margin-bottom:6px;font-weight:700;letter-spacing:-.5px}
.detail-header .sub{color:var(--sub);font-size:14px;margin-bottom:10px}

/* 分区标题 */
.section-title{font-size:15px;font-weight:700;margin:18px 0 8px;padding-left:10px;border-left:3px solid var(--section-color, var(--neutral));letter-spacing:-.1px}

/* 对立观点 */
.opinion-block{background:var(--opinion-bg);border-left:3px solid var(--section-color, var(--neutral-border));padding:14px 16px;margin:6px 0;border-radius:0 var(--radius) var(--radius) 0;font-size:14px}
.opinion-block .stance{font-weight:700;margin-bottom:4px}
.opinion-block .stance.pro{color:var(--green)}
.opinion-block .stance.con{color:var(--red)}

/* 时间轴 */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--section-color, var(--neutral-border)),var(--border));border-radius:1px}
.timeline-item{position:relative;padding-left:24px;margin-bottom:16px}
.timeline-item::before{content:"";position:absolute;left:-21px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--section-color, var(--neutral));border:2.5px solid var(--card);box-shadow:0 0 0 2px var(--section-color, var(--neutral))}
.timeline-item .time{font-size:13px;color:var(--section-color, var(--neutral));font-weight:600}
.timeline-item .action{font-size:14px;margin-top:2px}
.timeline-item .note{font-size:13px;color:var(--sub);margin-top:2px}
.tl-link{cursor:pointer}
.tl-link .action{color:var(--section-color, var(--neutral));text-decoration:underline;text-underline-offset:2px}

/* 关联区 */
.relations{background:var(--relations-bg);border-radius:var(--radius);padding:14px 16px;margin-top:10px;box-shadow:var(--shadow)}
.relations .rel-title{font-size:13px;font-weight:600;color:var(--section-color, var(--neutral));margin-bottom:6px;letter-spacing:.3px}
.rel-subtitle{font-size:13px;color:var(--sub);margin-bottom:4px}
.rel-subtitle.mt{margin-top:8px}
.rel-item{padding:8px 0;border-bottom:1px solid var(--divider);font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.rel-item:last-child{border-bottom:none}
.rel-item:active{color:var(--section-color, var(--neutral))}
.relations .rel-arrow{color:var(--sub);font-size:16px;margin-left:8px;flex-shrink:0}
.relations .rel-static{cursor:default;color:var(--text)}

/* 空状态 */
.empty{text-align:center;padding:48px 20px;color:var(--sub);font-size:14px}

/* 演出时间轴 */
.schedule-page{padding-bottom:20px}
.schedule-period{font-size:13px;font-weight:600;color:var(--sub);padding:12px 0 6px;border-bottom:1px solid var(--border);margin-top:8px}
.schedule-slot{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--divider);cursor:pointer;transition:background .15s}
.schedule-slot:active{background:rgba(0,0,0,.03)}
.schedule-time{font-size:20px;font-weight:700;color:var(--section-color, var(--neutral));min-width:56px;letter-spacing:-.5px}
.schedule-info{flex:1;margin-left:12px}
.schedule-name{font-size:15px;font-weight:600;color:var(--text)}
.schedule-meta{font-size:12px;color:var(--sub);margin-top:2px}

/* 面包屑 */
.breadcrumb{font-size:13px;margin-bottom:12px;display:flex;align-items:center;flex-wrap:wrap;gap:2px;padding:8px 12px;background:var(--card);border-radius:10px;box-shadow:0 1px 2px var(--divider)}
.bc-item{color:var(--neutral);cursor:pointer;padding:2px 6px;border-radius:4px;transition:background .15s}
.bc-item:active{background:var(--neutral-light)}
.bc-here{color:var(--text);font-weight:600;cursor:default;padding:2px 6px}
.bc-sep{color:var(--border);font-size:11px;margin:0 1px}

/* 可点击文字 */
.wc-link{color:var(--neutral);cursor:pointer}
.wc-link:active{opacity:.6}

/* 隐藏 */
.hidden{display:none}

/* 通用辅助类 */
.sub-text{font-size:13px;color:var(--sub)}
.small-text{font-size:12px;color:var(--sub)}
.warn-card{border-left-color:var(--c-warning)}
.dish-card{border-left-color:var(--c-dish)}
.indent{padding-left:12px}
</style>
</head>

day"],"source_files":["md_08","md_01"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_app","category":"工具使用","title":"App使用技巧","content":"提前下载北京环球度假区App，功能：查看排队时间、线上餐厅点单。随时刷排队时间，灵活调整行程","tags":["tag_time_saving"],"source_files":["md_08","md_01"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_crowd_judge","category":"行前判断","title":"人流量预判方法","content":"0点后打开乐园时间，看表演不可驯服的场次。基本当天人数约等于场次x5000。6场以下基本不用攻略，8场以上请考虑优速通或提前入园，10场快跑","tags":["tag_time_saving"],"source_files":["md_01"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_security_lane","category":"入园技巧","title":"安检通道选择","content":"排队过安检别瞎站，尽量挑两侧的两个通道，尤其是左侧，工作人员多效率高，实测能比旁边队伍早进去十几分钟","tags":["tag_time_saving"],"source_files":["md_02","md_01"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_no_photo_early","category":"入园技巧","title":"入园后不要在大球拍照","content":"不要在大球拍照！中午或者下午再出来拍，入园后提前看好地图确定方向，跑就完了","tags":["tag_time_saving"],"source_files":["md_02","md_09"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_entry_timing","category":"入园策略","title":"入园时间策略（存在不同观点）","content":"关于何时入园存在不同观点，详见opinions","tags":["tag_time_saving","tag_conflict"],"source_files":["md_01","md_02"],"attraction_ids":[],"opinion_ids":["op_entry_early","op_entry_relaxed","op_entry_no_rush_fj","op_entry_830"]},{"id":"tip_off_peak_hours","category":"时间技巧","title":"错峰时段推荐","content":"12:00-13:30和15:00-16:30是相对人少的错峰时段，适合刷热门项目或吃饭","tags":["tag_time_saving"],"source_files":["md_xhs_02"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_travel_light","category":"行前技巧","title":"轻装上阵原则","content":"尽量少带东西，带了也拿不进去浪费检查时间还得花钱寄存。带一个轻便双肩包装必需品即可，手机用挂绳挂在脖子上过安检和排队都快人一步","tags":["tag_time_saving","tag_save_money"],"source_files":["md_xhs_02"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_slush_cup","category":"省钱技巧","title":"雪泥续杯省钱法","content":"城市大道'春日狂欢纪念杯'88元含一杯雪泥，之后续杯20元/杯。如果计划喝两杯以上，买纪念杯比单买划算。单杯雪泥28元，两杯就是56元，而纪念杯+续杯=88+20=108元还多一杯","tags":["tag_save_money"],"source_files":["src_txt_04"],"attraction_ids":[],"opinion_ids":[]},{"id":"tip_merch_toothless","category":"购 y":"时间技巧","title":"闭园技巧","content":"闭园时间到了也不会赶人，在闭园时间到了之前进入到项目的排队队伍中就可以把项目玩完。推荐闭园前去玩飞跃侏罗纪（夜景很美）","tags":["tag_time_saving","tag_crowd_closing"],"source_files":["md_08"],"attraction_ids":["attr_velocicoaster"],"opinion_ids":[]},"tip_official_photo":{"id":"tip_official_photo","category":"拍照服务","title":"官方拍照服务","content":"环球有官拍服务，拍照点位：大球、城堡、见面会和几个骑乘项目。买当日拍照套餐，不要买单张纸质照片。套餐可以找人拼单，一共可以拍6人","tags":["tag_has_photo","tag_save_money"],"source_files":["md_08","md_09"],"attraction_ids":[],"opinion_ids":[]},"tip_birthday":{"id":"tip_birthday","category":"福利","title":"生日福利","content":"生日月记得去游客服务中心领生日徽章","tags":["tag_save_money","tag_birthday"],"source_files":["md_08","md_01"],"attraction_ids":[],"opinion_ids":[]},"tip_app":{"id":"tip_app","category":"工具使用","title":"App使用技巧","content":"提前下载北京环球度假区App，功能：查看排队时间、线上餐厅点单。随时刷排队时间，灵活调整行程","tags":["tag_time_saving"],"source_files":["md_08","md_01"],"attraction_ids":[],"opinion_ids":[]},"tip_crowd_judge":{"id":"tip_crowd_judge","category":"行前判断","title":"人流量预判方法","content":"0点后打开乐园时间，看表演不可驯服的场次。基本当天人数约等于场次x5000。6场以下基本不用攻略，8场以上请考虑优速通或提前入园，10场快跑","tags":["tag_time_saving"],"source_files":["md_01"],"attraction_ids":[],"opinion_ids":[]},"tip_security_lane":{"id":"tip_security_lane","category":"入园技巧","title":"安检通道选择","content":"排队过安检别瞎站，尽量挑两侧的两个通道，尤其是左侧，工作人员多效率高，实测能比旁边队伍早进去十几分钟","tags":["tag_time_saving"],"source_files":["md_02","md_01"],"attraction_ids":[],"opinion_ids":[]},"tip_no_photo_early":{"id":"tip_no_photo_early","category":"入园技巧","title":"入园后不要在大球拍照","content":"不要在大球拍照！中午或者下午再出来拍，入园后提前看好地图确定方向，跑就完了","tags":["tag_time_saving"],"source_files":["md_02","md_09"],"attraction_ids":[],"opinion_ids":[]},"tip_entry_timing":{"id":"tip_entry_timing","category":"入园策略","title":"入园时间策略（存在不同观点）","content":"关于何时入园存在不同观点，详见opinions","tags":["tag_time_saving","tag_conflict"],"source_files":["md_01","md_02"],"attraction_ids":[],"opinion_ids":["op_entry_early","op_entry_relaxed","op_entry_no_rush_fj","op_entry_830"]},"tip_off_peak_hours":{"id":"tip_off_ // ========== 工具函数 ==========
const $ = id => document.getElementById(id);
const app = () => $('app');

function find(id, type) { return DATA._maps[type] && DATA._maps[type][id]; }
function findReviews(targetId) { return DATA._maps.reviews_by_target[targetId] || []; }
function findOpinions(targetId) { return DATA._maps.opinions_by_target[targetId] || []; }
function findWarnings(targetId) { return DATA._maps.warnings_by_target[targetId] || []; }
function zonesHtml(zoneIds) { return (zoneIds || []).map(z => tagLookup(z)).filter(Boolean).join(' · '); }
function sentimentIcon(s) { return s === 'positive' ? '👍' : s === 'negative' ? '👎' : '🤔'; }
function sevStyle(sev) { return sev === 'high' ? 'color:var(--red);font-weight:700' : sev === 'medium' ? 'color:var(--orange)' : 'color:var(--sub)'; }

function dishRestaurantName(dish) {
  return (dish.restaurant_ids || []).map(rid => { const r = find(rid, 'restaurants'); return r ? r.name : ''; }).filter(Boolean)[0] || '';
}

function tagLookup(tagId) {
  const t = DATA.tags.tags.find(t => t.id === tagId);
  if (!t) return '';
  const catCls = ['zone','intensity','audience','utility','taste','meta_tag'].includes(t.category) ? t.category : '';
  const cls = 'tag' + (catCls ? ' ' + catCls : '');
  const click = typeof renderTagContent === 'function' ? ` onclick="nav('tags/${tagId}')"` : '';
  return `<span class="${cls}${click ? ' clickable' : ''}">${t.name}</span>`;
}

function getTypeTag(tags) {
  if (!tags || !tags.length) return '';
  const typeTag = tags.find(id => {
    const t = DATA.tags.tags.find(tag => tag.id === id);
    return t && t.category === 'attraction_type';
  });
  return typeTag ? tagLookup(typeTag) : '';
}

function getTypeIcon(tags) {
  if (!tags || !tags.length) return '🎤';
  const typeTag = tags.find(id => {
    const t = DATA.tags.tags.find(tag => tag.id === id);
    return t && t.category === 'attraction_type';
  });
  const iconMap = {
    'tag_type_parade': '🎪',
    'tag_type_live_show': '🎭',
    'tag_type_light_show': '✨',
    'tag_type_stunt_show': '🔥',
    'tag_type_interactive_show': '🤝'
  };
  return typeTag && iconMap[typeTag] ? iconMap[typeTag] : '🎤';
}

function categoryLookup(catId) {
  const c = DATA.tags.categories.find(c => c.id === catId);
  return c ? c.name : catId;
}

function starsHtml(rating) {
  if (!rating) return '';
  return '<span class="stars">' + '★'.repeat(rating) + '☆'.repeat(5 - rating) + '</span>';
}

function severityIcon(sev) {
  if (sev === 'high') return '🔴';
  if (sev === 'medium') return '🟠';
  return '🟡';
}

function severityHtml(sev) {
  const cls = sev === 'high' ? 'sev-high' : sev === 'medium' ? 'sev-medium' : 'sev-low';
  const label = sev === 'high' ? '严重' : sev === 'medium' ? '注意' : '轻微';
  return `<span class="${cls}">[${label}]</span>`;
}

function tagsHtml(tagIds, clickable) {
  if (!tagIds || !tagIds.length) return '';
  return tagIds.map(id => {
    const t = DATA.tags.tags.find(t => t.id === id);
    if (!t) return '';
    const catCls = ['zone','intensity','audience','utility','taste','meta_tag'].includes(t.category) ? ' ' + t.category : '';
    const clickCls = clickable ? ' clickable' : '';
    const onclick = clickable ? ` onclick="nav('tags/${id}')"` : '';
    return `<span class="tag${catCls}${clickCls}"${onclick}>${t.name}</span>`;
  }).join('');
}

// ========== 通用渲染 ==========

const SEV_ORDER = { high: 0, medium: 1, low: 2 };
const TIP_ICONS = ['💡','⏰','🎒','📱','🎯','🔑'];
function sortBySeverity(a, b) { return (SEV_ORDER[a.severity] ?? 3) - (SEV_ORDER[b.severity] ?? 3); }

function renderReviews(entityId) {
  const reviews = findReviews(entityId);
  if (!reviews || !reviews.length) return '';
  let html = '<div class="section-title">游客评价</div><div class="card">';
  const groups = [
    ['positive', reviews.filter(r => r.sentiment === 'positive'), '👍 好评', 'var(--green)'],
    ['negative', reviews.filter(r => r.sentiment === 'negative'), '👎 差评', 'var(--red)'],
    ['mixed', reviews.filter(r => r.sentiment === 'mixed' || r.sentiment === 'neutral'), '🤔 中评', 'var(--orange)']
  ];
  groups.forEach(([key, items, label, color]) => {
    if (!items.length) return;
    html += `<div style="font-size:12px;color:${color};margin-bottom:4px;margin-top:6px">${label} (${items.length})</div>`;
    items.forEach(r => { html += `<p>${r.content || ''}</p>`; });
  });
  return html + '</div>';
}

function renderOpinions(entityId) {
  const opinions = findOpinions(entityId);
  if (!opinions || !opinions.length) return '';
  let html = '<div class="section-title">不同观点</div>';
  opinions.forEach(op => {
    const cls = op.stance === 'pro' ? 'pro' : 'con';
    const label = op.stance === 'pro' ? '✅ 正方' : '❌ 反方';
    html += `<div class="opinion-block"><div class="stance ${cls}">${label}</div><div><b>${op.claim}</b></div><p>${op.reasoning || ''}</p></div>`;
  });
  return html;
}

function renderWarnings(entityId) {
  const warnings = findWarnings(entityId);
  if (!warnings || !warnings.length) return '';
  let html = '<div class="section-title">注意事项</div><div class="card">';
  warnings.slice().sort(sortBySeverity).forEach(w => { html += `<p>${severityHtml(w.severity)} ${w.content || ''}</p>`; });
  return html + '</div>';
}

function renderFilterBar(filterValue, filterFnName) {
  const zoneTags = DATA.tags.tags.filter(t => t.category === 'zone');
  let html = '<div class="filter-bar">';
  html += `<span class="filter-btn ${filterValue === 'all' ? 'active' : ''}" onclick="${filterFnName}('all')">全部</span>`;
  zoneTags.forEach(t => {
    html += `<span class="filter-btn ${filterValue === t.id ? 'active' : ''}" onclick="${filterFnName}('${t.id}')">${t.name}</span>`;
  });
  return html + '</div>';
}

function renderEntityLinks(title, type, ids, nameField, icon) {
  if (!ids || !ids.length) return '';
  let html = `<div class="section-title">${title}</div>`;
  ids.forEach(id => {
    const item = find(id, type);
    if (item) html += `<div class="list-item" data-type="${type}" onclick="nav('${type}/${id}')"><div class="info"><h4>${icon || ''}${item[nameField] || item.name || item.content || ''}</h4></div><span class="arrow">›</span></div>`;
  });
  return html;
}

// ========== 路由 ==========
function nav(page) {
  location.hash = page;
}

// ========== 状态管理 ==========
const filters = { attractions: 'all', shows: 'all', restaurants: 'all', dishes: 'all' };
function setFilter(key, page, renderFn) {
  return function(zoneId) {
    filters[key] = zoneId;
    app().innerHTML = breadcrumb(page) + renderFn();
    window.scrollTo(0, 0);
  };
}
const setAttrFilter = setFilter('attractions', 'attractions', renderAttractionList);
const setShowFilter = setFilter('shows', 'shows', renderShowList);
const setRestFilter = setFilter('restaurants', 'restaurants', renderRestaurantList);
const setDishFilter = setFilter('dishes', 'dishes', renderDishList);

// ========== 首页轮播 ==========
const carousel = { timer: null, idx: 0, touchStartX: 0, touchDeltaX: 0, isSwiping: false };
function goSlide(idx) {
  var c = document.getElementById('homeCarousel');
  if (!c) return;
  var track = c.querySelector('.carousel-track');
  var slides = c.querySelectorAll('.carousel-slide');
  var dots = c.querySelectorAll('.carousel-dot');
  var total = slides.length;
  if (idx < 0) idx = total - 1;
  if (idx >= total) idx = 0;
  if (track) track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
  carousel.idx = idx;
}
function startCarousel() {
  var c = document.getElementById('homeCarousel');
  if (!c) return;
  var total = c.querySelectorAll('.carousel-slide').length;
  if (total <= 1) return;
  shuffleCarouselContent();
  carousel.timer = setInterval(function() {
    goSlide(carousel.idx + 1);
    shuffleCarouselContent();
  }, 5000);
  // 触摸滑动
  c.addEventListener('touchstart', function(e) { carousel.touchStartX = e.touches[0].clientX; carousel.isSwiping = true; }, {passive: true});
  c.addEventListener('touchmove', function(e) {
    if (!carousel.isSwiping) return;
    carousel.touchDeltaX = e.touches[0].clientX - carousel.touchStartX;
  }, {passive: true});
  c.addEventListener('touchend', function() {
    if (!carousel.isSwiping) return;
    carousel.isSwiping = false;
    if (Math.abs(carousel.touchDeltaX) > 40) { goSlide(carousel.touchDeltaX < 0 ? carousel.idx + 1 : carousel.idx - 1); }
    carousel.touchDeltaX = 0;
  });
}
function stopCarousel() { if (carousel.timer) { clearInterval(carousel.timer); carousel.timer = null; } }

// 后台时轮播内容随机刷新
function shuffleCarouselContent() {
  var c = document.getElementById('homeCarousel');
  if (!c || !DATA || !DATA.tips || !DATA.warnings) return;
  var allTips = DATA.tips.tips;
  var allWarns = DATA.warnings.warnings;
  var allDishes = DATA.dishes.dishes.filter(function(d) { return findReviews(d.id).length > 0; });
  function pick(arr, n) {
    var s = arr.slice().sort(function() { return Math.random() - 0.5; });
    return s.slice(0, n);
  }
  var tipIcons = TIP_ICONS;
  var slides = c.querySelectorAll('.carousel-slide');
  slides.forEach(function(slide) {
    var type = slide.getAttribute('data-type');
    var grid = slide.querySelector('.tip-grid');
    if (!grid) return;
    var html = '';
    if (type === 'tip') {
      var items = pick(allTips, 6);
      items.forEach(function(t, i) {
        html += '<div class="tip-card" onclick="nav(\'tips/' + t.id + '\')"><div class="tip-icon">' + (tipIcons[i] || '💡') + '</div><h4>' + (t.title || t.category) + '</h4><p>' + (t.content || '').slice(0, 60) + '</p></div>';
      });
    } else if (type === 'warn') {
      var items = pick(allWarns, 6);
      items.forEach(function(w) {
        var sevCls = sevStyle(w.severity);
        html += '<div class="tip-card warn-card" onclick="nav(\'warnings/' + w.id + '\')"><div class="tip-icon" style="' + sevCls + '">' + severityIcon(w.severity) + '</div><h4>' + (w.content || '').slice(0, 20) + '</h4><p>' + (w.content || '').slice(0, 60) + '</p></div>';
      });
    } else if (type === 'dish') {
      var items = pick(allDishes, 6);
      items.forEach(function(d) {
        var restName = dishRestaurantName(d);
        var reviews = findReviews(d.id);
        var sentiment = reviews[0] ? reviews[0].sentiment : '';
        var sentIcon = sentimentIcon(sentiment);
        html += '<div class="tip-card dish-card" onclick="nav(\'dishes/' + d.id + '\')"><div class="tip-icon">' + sentIcon + '</div><h4>' + d.name + '</h4><p>' + restName + '</p></div>';
      });
    }
    grid.innerHTML = html;
  });
}
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { stopCarousel(); }
  else {
    shuffleCarouselContent();
    var c = document.getElementById('homeCarousel');
    if (c && c.querySelectorAll('.carousel-slide').length > 1) startCarousel();
  }
});

// ========== 面包屑导航 ==========
const PAGE_META = {
  home:        {label: '首页', parent: null},
  attractions: {label: '游乐项目', parent: 'home'},
  shows:       {label: '演出', parent: 'home'},
  show_schedule: {label: '演出时间轴', parent: 'shows'},
  restaurants: {label: '餐厅', parent: 'home'},
  dishes:      {label: '菜品', parent: 'restaurants'},
  itineraries: {label: '行程', parent: 'home'},
  tips:        {label: '技巧', parent: 'home'},
  warnings:    {label: '避雷', parent: 'home'},
  preparations:{label: '行前准备', parent: 'home'},
  shortcuts:   {label: '小道', parent: 'home'},
  tags:        {label: '标签', parent: 'home'},
  more:        {label: '更多', parent: 'home'},
};

function breadcrumb(page, param) {
  const meta = PAGE_META[page];
  if (!meta) return '';
  const crumbs = [];
  if (param && meta) {
    // 详情页：当前type就是列表页
    crumbs.push({hash: page, label: meta.label});
  }
  // 向上追溯到首页
  let cur = meta;
  while (cur && cur.parent) {
    const parentMeta = PAGE_META[cur.parent];
    if (parentMeta) crumbs.push({hash: cur.parent, label: parentMeta.label});
    cur = parentMeta;
  }
  crumbs.reverse();
  // 最后一项是当前页
  const current = crumbs.pop();
  return '<div class="breadcrumb">' + crumbs.map(c => `<span class="bc-item" onclick="nav('${c.hash}')">${c.label}</span>`).join('<span class="bc-sep">/</span>') + `<span class="bc-here">${current ? current.label : page}</span></div>`;
}

function resolveEntityName(page, id) {
  if (!id) return '';
  const e = find(id, page);
  if (!e) return '';
  if (e.name) return e.name;
  if (e.title) return e.title;
  if (e.content) return e.content.slice(0, 20);
  return '';
}

function router() {
  const hash = location.hash.slice(1) || 'home';
  const parts = hash.split('/');
  const page = parts[0];
  const param = parts[1] || null;

  // 底栏高亮
  document.querySelectorAll('#nav a').forEach(a => {
    const dp = a.dataset.page;
    a.classList.toggle('active', page === dp || page.startsWith(dp.replace(/s$/, '')));
  });

  // 详情页渲染器映射（复数type → detail函数）
  const DETAIL = {
    attractions: id => renderAttractionDetail(id),
    shows: id => renderShowDetail(id),
    restaurants: id => renderRestaurantDetail(id),
    dishes: id => renderDishDetail(id),
    itineraries: id => renderItineraryDetail(id),
    tips: id => renderTipDetail(id),
    warnings: id => renderWarningDetail(id),
    shortcuts: id => renderShortcutDetail(id),
    tags: id => renderTagContent(id),
    preparations: id => renderPreparationDetail(id),
  };

  // 列表页渲染器映射
  const LIST = {
    home: renderHome,
    attractions: renderAttractionList,
    shows: renderShowList,
    show_schedule: renderShowSchedule,
    restaurants: renderRestaurantList,
    dishes: renderDishList,
    itineraries: renderItineraryList,
    tips: renderTipList,
    warnings: renderWarningList,
    shortcuts: renderShortcutList,
    tags: renderTagCloud,
    preparations: renderPreparations,
    more: renderMore,
  };

  let html = '';
  // 列表页/详情页的实体颜色映射
  const PAGE_COLOR = {
    attractions:'var(--c-attraction)', shows:'var(--c-show)',
    restaurants:'var(--c-restaurant)', dishes:'var(--c-dish)',
    tips:'var(--c-tip)', warnings:'var(--c-warning)',
    shortcuts:'var(--c-shortcut)', itineraries:'var(--c-itinerary)',
  };
  if (param && DETAIL[page]) {
    // 详情页
    html = breadcrumb(page, param) + DETAIL[page](param);
  } else if (LIST[page]) {
    // 列表页
    const content = (page !== 'home' ? breadcrumb(page) : '') + LIST[page]();
    const color = PAGE_COLOR[page];
    html = color ? `<div style="--section-color:${color}">${content}</div>` : content;
  }

  if (html) {
    app().innerHTML = html;
    window.scrollTo(0, 0);
  }
}

window.addEventListener('hashchange', function() { stopCarousel(); router(); if (location.hash === '#home' || location.hash === '' || location.hash === '#') startCarousel(); });
window.addEventListener('DOMContentLoaded', function() { router(); startCarousel(); });

function renderTop5Chart() {
  const top5 = DATA.attractions.attractions
    .filter(a => a.ranking)
    .sort((a, b) => a.ranking - b.ranking)
    .slice(0, 5);
  if (!top5.length) return '';
  let html = '<div class="section-title">项目排名 Top5</div>';
  const BAR_COLORS = ['linear-gradient(90deg,#007aff,#5ac8fa)','linear-gradient(90deg,#af52de,#da8fff)','linear-gradient(90deg,#ff9500,#ffcc00)','linear-gradient(90deg,#34c759,#86efac)','linear-gradient(90deg,#007aff,#5856d6)'];
  html += '<div class="rank-chart"><div class="rank-chart-title">🎢 必玩项目推荐</div>';
  const maxRating = 5;
  top5.forEach((a, i) => {
    const pct = Math.round((a.rating / maxRating) * 100);
    const barBg = BAR_COLORS[i] || BAR_COLORS[0];
    const stars = '★'.repeat(a.rating) + '☆'.repeat(5 - a.rating);
    html += `<div class="rank-row" onclick="nav('attractions/${a.id}')">
      <div class="rank-num">#${a.ranking}</div>
      <div class="rank-name">${a.name}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:${barBg}"><span>${stars} ${a.rating}分</span></div></div>
    </div>`;
  });

}

function buildCarouselSlides() {
  const warnItems = DATA.warnings.warnings.slice(0, 6);

  const slides = [
    {type:'tip', items: DATA.tips.tips.slice(0, 6)},
    {type:'warn', items: warnItems},
    {type:'dish', items: dishItems}

  if (slides.length <= 1) return '';

  slides.forEach(s => {
    html += `<div class="carousel-slide" data-type="${s.type}">`;
    html += renderSlideContent(s);
    html += '</div>';
  });
  html += '</div><div class="carousel-dots">';
  slides.forEach((_, i) => html += `<span class="carousel-dot${i === 0 ? ' active' : ''}" onclick="goSlide(${i})"></span>`);

// --- 反向索引渲染 ---
function renderRelations(entityId) {
  let hasContent = false;
  let html = '<div class="section-title">关联信息</div><div class="relations">';

  // 1. 同园区内容（通过 zone_index）
  const zoneId = resolveEntityZone(entityId);
  if (zoneId) {
    const zi = INDEXES.zone_index[zoneId];
    if (zi) {
      // 同园区其他项目
      const otherAttrs = (zi.attractions || []).filter(id => id !== entityId);
      if (otherAttrs.length) {
        hasContent = true;
        html += '<div class="rel-subtitle">同园区项目</div>';
        otherAttrs.forEach(id => {
          const a = find(id, 'attractions');
          if (a) html += `<div class="rel-item" onclick="nav('attractions/${id}')"><span style="color:var(--c-attraction)">●</span> ${a.name} ${starsHtml(a.rating)} <span class="rel-arrow">›</span></div>`;
        });
      }
      // 同园区演出
      if (zi.shows && zi.shows.length) {
        hasContent = true;
        html += '<div class="rel-subtitle mt">同园区演出</div>';
        zi.shows.forEach(id => {
          const s = find(id, 'shows');
          if (s) html += `<div class="rel-item" onclick="nav('shows/${id}')"><span style="color:var(--c-show)">●</span> ${s.name} <span class="rel-arrow">›</span></div>`;
        });
      }
      // 同园区餐厅
      if (zi.restaurants && zi.restaurants.length) {
        hasContent = true;
        html += '<div class="rel-subtitle mt">同园区餐厅</div>';
        zi.restaurants.forEach(id => {
          const r = find(id, 'restaurants');
          if (r) html += `<div class="rel-item" onclick="nav('restaurants/${id}')"><span style="color:var(--c-restaurant)">●</span> ${r.name} <span class="rel-arrow">›</span></div>`;
        });
      }
    }
  }

  // 1.5 替代选择（通过 alternative_index）
  const altRels = INDEXES.alternative_index[entityId];
  if (altRels && altRels.length) {
    hasContent = true;
    html += '<div class="rel-subtitle mt">替代选择</div>';
    altRels.forEach(alt => {
      let label = alt.name;
      if (!label && alt.entity_id) {
        const dd = find(alt.entity_id, 'dishes');
        if (dd) label = dd.name;
        else { const rr = find(alt.entity_id, 'restaurants'); if (rr) label = rr.name; }
      }
      if (label && alt.entity_id) {
        const route = alt.type === 'dish' ? 'dishes' : alt.type === 'restaurant' ? 'restaurants' : alt.type === 'attraction' ? 'attractions' : alt.type === 'warning' ? 'warnings' : alt.type === 'show' ? 'shows' : '';
        html += `<div class="rel-item" onclick="nav('${route}/${alt.entity_id}')">
          🔄 ${label}${alt.reason ? ' · ' + alt.reason : ''} <span class="rel-arrow">›</span></div>`;
      } else if (label) {
        html += `<div class="rel-item rel-static">🔄 ${label}${alt.reason ? ' · ' + alt.reason : ''}</div>`;
      }
    });
  }

  // 2. 反向索引（backrefs）
  const refs = INDEXES.backrefs[entityId];
  if (refs) {
    if (refs.tips && refs.tips.length) {
      hasContent = true;
      html += '<div class="rel-subtitle mt">相关技巧</div>';
      refs.tips.forEach(t => {
        html += `<div class="rel-item" onclick="nav('tips/${t.id}')">💡 ${t.title} <span class="rel-arrow">›</span></div>`;
      });
    }

    if (refs.warnings && refs.warnings.length) {
      hasContent = true;
      html += '<div class="rel-subtitle mt">相关避雷</div>';
      refs.warnings.forEach(w => {
        const short = (w.content || '').slice(0, 40) + ((w.content || '').length > 40 ? '...' : '');
        const alt = w.alternative ? ' → ' + w.alternative : '';
        html += `<div class="rel-item" onclick="nav('warnings/${w.id}')">⚠️ ${severityHtml(w.severity)} ${short}${alt} <span class="rel-arrow">›</span></div>`;
      });
    }

    if (refs.itineraries && refs.itineraries.length) {
      hasContent = true;
      html += '<div class="rel-subtitle mt">出现在行程</div>';
      refs.itineraries.forEach(it => {
        html += `<div class="rel-item" onclick="nav('itineraries/${it.id}')">📅 ${it.name} ${it.time || ''} ${it.action ? '· ' + it.action : ''} <span class="rel-arrow">›</span></div>`;
      });
    }
    if (refs.reviews && refs.reviews.length) {
      html += '<div class="rel-subtitle mt">相关评价</div>';
      refs.reviews.forEach(r => {
        const icon = sentimentIcon(r.sentiment);
        html += `<div class="rel-item" style="cursor:default"><span style="font-size:12px">${icon} ${(r.content || '').length > 40 ? (r.content || '').slice(0, 40) + '...' : (r.content || '')}</span></div>`;
      });
    }
  }

  html += '</div>';
  return hasContent ? html : '';
}

function resolveEntityZone(entityId) {
  if (!entityId) return '';
  for (const type of ['attractions','shows','restaurants','dishes']) {

    if (e && e.zone_ids && e.zone_ids.length) return e.zone_ids[0];

  return '';

// --- 演出时间轴 ---
function renderShowSchedule() {
  // 按时间排序所有演出场次
  var slots = [];
  DATA.shows.shows.forEach(function(s) {
    var sched = s.schedule || {};
    var times = sched.example_times || sched.times || [];
    if (!times.length) return;
    // 超过8场的演出只取首尾各3场，避免时间轴过长
    if (times.length > 8) {
      times = times.slice(0, 3).concat(times.slice(-3));
    }
    times.forEach(function(t) {
      var h = parseInt(t.split(':')[0]) || 0;
      var m = parseInt(t.split(':')[1]) || 0;
      slots.push({time: t, sort: h * 60 + m, show: s, duration: sched.duration_minutes || 0, note: sched.note || ''});
    });
  });
  slots.sort(function(a, b) { return a.sort - b.sort; });

  var html = '<div class="schedule-page">';
  html += '<div class="card hint"><p class="sub-text">以下为参考时间，实际场次以当日App为准。点击演出名称查看详情。</p></div>';

  var curHour = -1;
  slots.forEach(function(slot) {
    var h = parseInt(slot.time.split(':')[0]);
    // 时间分组标题
    if (h !== curHour) {
      curHour = h;
      var period = h < 12 ? '上午' : h < 18 ? '下午' : '晚上';
      html += '<div class="schedule-period">' + period + ' ' + slot.time.split(':')[0] + ':00</div>';
    }
    // 场次卡片
    var s = slot.show;
    var zoneName = zonesHtml(s.zone_ids) || '';
    var durStr = slot.duration ? slot.duration + 'min' : '';
    var typeLabel = getTypeIcon(s.tags);
    html += '<div class="schedule-slot" onclick="nav(\'shows/' + s.id + '\')">';
    html += '<div class="schedule-time">' + slot.time + '</div>';
    html += '<div class="schedule-info">';
    html += '<div class="schedule-name">' + typeLabel + ' ' + s.name + '</div>';
    html += '<div class="schedule-meta">' + zoneName + (durStr ? ' · ' + durStr : '') + '</div>';
    html += '</div></div>';
  });

  html += '</div>';
  return html;
}

        // 确定链接目标：优先取第一个有值的实体
        let onclick = '';
        if (attractions.length) onclick = ` class="tl-link" onclick="nav('attractions/${attractions[0].id}')"`;
        else if (shows.length) onclick = ` class="tl-link" onclick="nav('shows/${shows[0].id}')"`;
        else if (restaurants.length) onclick = ` class="tl-link" onclick="nav('restaurants/${restaurants[0].id}')"`;

        // 构建关联实体名称列表
        const linkedNames = [];
        attractions.forEach(a => linkedNames.push(a.name));
        shows.forEach(s => linkedNames.push(s.name));
        restaurants.forEach(r => linkedNames.push(r.name));
        const extraNames = linkedNames.length > 1 ? linkedNames.slice(1).join('、') : '';

        html += `<div class="timeline-item"${onclick}>

          <div class="action">${item.action || ''}${onclick ? ' ›' : ''}</div>

    html += '</div>';
  }
  if (tr.alternative_departure) { html += '<div class="section-title">💡 回程建议</div><div class="opinion-block"><p>' + tr.alternative_departure + '</p></div>'; }
  return html;
}

function renderClothingSection(p) {
  const cl = p.clothing;
  if (!cl) return '<div class="empty">暂无数据</div>';
  let html = '<div class="card">';
  if (cl.must_wear) html += `<p>👟 <b>必穿：</b>${cl.must_wear}</p>`;
  if (cl.must_bring) html += `<p>🧥 <b>必带：</b>${cl.must_bring}</p>`;
  if (cl.forbidden) html += `<p>🚫 <b>不要穿：</b>${cl.forbidden}</p>`;
  if (cl.note) html += `<p style="margin-top:8px;color:var(--sub)">${cl.note}</p>`;
  return html + '</div>';
}

function renderItemsSection(p) {
  let html = '';
  if (p.essential_items && p.essential_items.length) {
    html += '<div class="section-title">必带物品</div><div class="card">';
    p.essential_items.forEach(i => html += `<p>📦 ${i.item}${i.purpose ? ' — ' + i.purpose : ''}</p>`);
    html += '</div>';
  }
  if (p.prohibited_items && p.prohibited_items.length) {
    html += '<div class="section-title">禁忌物品</div><div class="card">';
    p.prohibited_items.forEach(i => html += `<p>🚫 ${i.item}${i.reason ? ' — ' + i.reason : ''}</p>`);
    html += '</div>';
  }
  return html || '<div class="empty">暂无数据</div>';
}

function renderDatesSection(p) {
  const bd = p.best_dates;
  if (!bd) return '<div class="empty">暂无数据</div>';
  let html = '<div class="card">';
  if (bd.off_peak_seasons) { html += '<p><b>淡季推荐：</b>'; bd.off_peak_seasons.forEach(s => html += `<span class="tag zone">${s}</span>`); html += '</p>'; }
  if (bd.best_weekdays) { html += '<p><b>最佳周几：</b>'; bd.best_weekdays.forEach(w => html += `<span class="tag zone">${w}</span>`); html += '</p>'; }
  if (bd.weekend_note) html += `<p>${bd.weekend_note}</p>`;
  if (bd.holiday_tip) html += `<p>${bd.holiday_tip}</p>`;
  html += '</div>';
  const ce = p.crowd_estimation;
  if (ce) {
    html += '<div class="section-title">人流量判断</div><div class="card">';
    if (ce.method) html += `<p><b>判断方法：</b>${ce.method}</p>`;
    if (ce.formula) html += `<p><b>估算公式：</b>${ce.formula}</p>`;
    if (ce.thresholds && ce.thresholds.length) {
      html += '<p style="margin-top:6px"><b>参考标准：</b></p>';
      ce.thresholds.forEach(t => {
        let range = '';
        if (t.max_sessions && !t.min_sessions) range = `≤${t.max_sessions}场`;
        else if (t.min_sessions && t.max_sessions) range = `${t.min_sessions}-${t.max_sessions}场`;
        else if (t.min_sessions) range = `≥${t.min_sessions}场`;
        html += `<p>${range} → ${t.advice}</p>`;
      });
    }
    html += '</div>';
  }
  return html;
}

function renderChecklistSection(p) {
  if (!p.pre_trip_checklist || !p.pre_trip_checklist.length) return '<div class="empty">暂无数据</div>';
  let html = '<div class="card">';
  p.pre_trip_checklist.forEach(i => html += `<p>☑️ ${i.item}${i.purpose ? ' — ' + i.purpose : ''}</p>`);
  return html + '</div>';
}

function renderTicketSection(p) {
  if (!p.ticket_prices) return '<div class="empty">暂无数据</div>';
  const tp = p.ticket_prices;
  let html = '';
  if (tp.note) html += `<p style="font-size:12px;color:var(--sub);margin-bottom:8px">⚠️ ${tp.note}</p>`;
  html += '<div class="section-title">🎫 门票</div><div class="card">';
  if (tp.tiers) { tp.tiers.forEach(t => html += `<p><b>${t.type}</b>：¥${t.price}${t.description ? ' <span class="small-text">（' + t.description + '）</span>' : ''}</p>`); }
  html += '</div>';
  if (tp.express_pass) {
    const ep = tp.express_pass;
    html += '<div class="section-title">⚡ 优速通</div><div class="card">';
    if (ep.note) html += `<p class="small-text">${ep.note}</p>`;
    if (ep.options) { ep.options.forEach(o => html += `<p><b>${o.type}</b>：¥${o.price}${o.description ? ' — ' + o.description : ''}</p>`); }
    html += '</div>';
  }
  return html;
}

function renderParkingSection(p) {
  let html = '';
  if (p.parking) {
    html += '<div class="section-title">🅿️ 停车场</div><div class="card">';
    if (p.parking.note) html += `<p class="small-text">${p.parking.note}</p>`;
    if (p.parking.options) { p.parking.options.forEach(o => html += `<p><b>${o.type}</b>：${o.price}${o.unit}${o.description ? ' <span class="small-text">（' + o.description + '）</span>' : ''}</p>`); }
    html += '</div>';
  }
  if (p.locker) {
    const lk = p.locker;
    html += '<div class="section-title">🔒 寄存</div><div class="card">';
    if (lk.note) html += `<p class="small-text">⚠️ ${lk.note}</p>`;
    if (lk.self_service) { html += '<p><b>自助寄存柜</b></p>'; lk.self_service.forEach(s => html += `<p class="indent">${s.type}：${s.price}${s.unit}（${s.size}）</p>`); }
    if (lk.ride_locker) { html += '<p><b>项目入口寄存柜</b></p><p class="indent">' + lk.ride_locker.description + ' — ' + lk.ride_locker.price + '</p>'; }
    if (lk.baggage_service) {
      const bs = lk.baggage_service;
      html += `<p><b>${bs.description}</b></p>`;
      if (bs.prices) bs.prices.forEach(pr => html += `<p class="indent">${pr.type}：${pr.price}${pr.unit}${pr.note ? '（' + pr.note + '）' : ''}</p>`);
      if (bs.note) html += `<p class="small-text">${bs.note}</p>`;
    }
    html += '</div>';
  }
  return html || '<div class="empty">暂无数据</div>';
}

function renderRentalSection(p) {
  if (!p.rental) return '<div class="empty">暂无数据</div>';
  const rt = p.rental;
  let html = '<div class="card">';
  if (rt.wheelchair) html += `<p><b>♿ 轮椅</b>：${rt.wheelchair.price}${rt.wheelchair.unit}${rt.wheelchair.location ? '（' + rt.wheelchair.location + '）' : ''}</p>`;
  if (rt.stroller) { rt.stroller.forEach(s => html += `<p><b>🚼 ${s.type}</b>：${s.price}${s.unit}</p>`); }
  if (rt.note) html += `<p class="small-text">⚠️ ${rt.note}</p>`;
  return html + '</div>';
}

const PREP_SECTIONS = {
  transport: { title: '交通指南', render: renderTransportSection },
  clothing:  { title: '穿衣指南', render: renderClothingSection },
  items:     { title: '物品清单', render: renderItemsSection },
  dates:     { title: '最佳日期', render: renderDatesSection },
  checklist: { title: '行前必做', render: renderChecklistSection },
  ticket:    { title: '票价与优速通', render: renderTicketSection },
  parking:   { title: '停车与寄存', render: renderParkingSection },
  rental:    { title: '租赁服务', render: renderRentalSection },
};

function renderPreparationDetail(section) {
  const p = DATA.preparations;
  if (!p) return '<div class="empty">暂无数据</div>';
  const config = PREP_SECTIONS[section];
  if (!config) return '<div class="empty">暂无数据</div>';
  return `<div class="detail-header"><h2>${config.title}</h2></div>` + config.render(p);
}

// --- 秘密小道 ---// --- 秘密小道 ---
function renderShortcutList() {
  let html = '';
  DATA.shortcuts.shortcuts.forEach(s => {
    html += `<div class="list-item" data-type="shortcut" onclick="nav('shortcuts/${s.id}')">
      <div class="info"><h4>${s.name}</h4>
      <p>${s.from} → ${s.to} · 节省${s.savings}</p></div>
      <span class="arrow">›</span></div>`;
  });
  return html;
}

// --- 标签云 ---
function renderShortcutDetail(id) {
  const s = find(id, 'shortcuts');
  if (!s) return '<div class="empty">内容不存在</div>';
  let html = '<div style="--section-color:var(--c-shortcut)">';
  html += `<div class="detail-header" data-type="shortcut"><h2>${s.name}</h2>
    <div class="sub">${s.from} → ${s.to}</div></div>`;

  html += '<div class="card">';
  html += `<p><b>路线</b>：${s.route || '暂无'}</p>`;
  if (s.savings) html += `<p><b>节省</b>：${s.savings}</p>`;
  if (s.avoid_mistake) html += `<p><b>避坑</b>：${s.avoid_mistake}</p>`;
  if (s.condition) html += `<p><b>条件</b>：${s.condition}</p>`;
  html += '</div>';

  if (s.tags && s.tags.length) {
    html += '<div class="section-title">标签</div><div class="card">';
    html += tagsHtml(s.tags, true);
    html += '</div>';
  }

  html += renderRelations(id);
  return html + '</div>';
}

function renderTagCloud() {
  let html = '';
  const categories = DATA.tags.categories;
  categories.forEach(cat => {
    const catTags = DATA.tags.tags.filter(t => t.category === cat.id);
    if (!catTags.length) return;
    html += `<div class="card"><h3>${cat.name}</h3>`;
    catTags.forEach(t => {
      const tagCount = (INDEXES.tag_index[t.id] ? Object.values(INDEXES.tag_index[t.id]).flat().length : 0);
      const zoneCount = (INDEXES.zone_index[t.id] ? Object.values(INDEXES.zone_index[t.id]).flat().length : 0);
      const count = tagCount + zoneCount;
      html += `<span class="tag clickable" onclick="nav('tags/${t.id}')">${t.name} (${count})</span> `;
    });
    html += '</div>';
  });
  return html;
}

function renderTagContent(tagId) {
  const tag = DATA.tags.tags.find(t => t.id === tagId);
  if (!tag) return '<div class="empty">未找到标签</div>';

  let html = '';
  html += `<div class="detail-header"><h2>${tag.name}</h2>
    <div class="sub">${categoryLookup(tag.category)}${tag.description ? ' · ' + tag.description : ''}</div></div>`;

  // 合并 tag_index 和 zone_index（zone 标签可能只在 zone_index 中）
  const tagIdx = INDEXES.tag_index[tagId] || {};
  const zoneIdx = INDEXES.zone_index[tagId] || {};
  const idx = {};
  for (const type of ['attractions','shows','restaurants','dishes','tips','shortcuts','warnings','itineraries']) {
    const items = [...new Set([...(tagIdx[type] || []), ...(zoneIdx[type] || [])])];
    if (items.length) idx[type] = items;
  }

  html += renderEntityLinks('相关项目', 'attractions', idx.attractions, 'name');
  html += renderEntityLinks('相关演出', 'shows', idx.shows, 'name');
  html += renderEntityLinks('相关餐厅', 'restaurants', idx.restaurants, 'name');

  html += renderEntityLinks('相关菜品', 'dishes', idx.dishes, 'name', '🍽️ ');

  html += renderEntityLinks('相关技巧', 'tips', idx.tips, 'title');
  html += renderEntityLinks('相关小道', 'shortcuts', idx.shortcuts, 'name');

  html += renderEntityLinks('相关避雷', 'warnings', idx.warnings, 'content', '⚠️ ');

  html += renderEntityLinks('相关行程', 'itineraries', idx.itineraries, 'name', '📅 ');

  const hasAny = Object.values(idx).some(v => v && v.length);
  if (!hasAny) html += '<div class="empty">暂无关联内容</div>';

  return html;
}

  html += `<div class="card footer-text">

    <p>数据版本：v${DATA.meta.version || '1.0'} · 数据更新日期：${DATA.meta.last_updated || '未知'}</p>
  </div>`;
  return html;
}
